name: Deploy Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          vars.ENABLE_STAGING_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run staging database migrations
        if: ${{ secrets.STAGING_DATABASE_URL != '' }}
        run: npm run db:migrate -w @wilms/api
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy API to Railway (staging)
        if: ${{ secrets.RAILWAY_STAGING_SERVICE_ID != '' }}
        uses: berviantoleo/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}

      - name: Deploy frontend to Vercel (preview)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          vercel-args: '--yes'

      - name: Staging health check
        if: ${{ secrets.WILMS_STAGING_API_URL != '' }}
        run: curl -fsS "${{ secrets.WILMS_STAGING_API_URL }}/health"

      - name: Staging smoke tests
        if: ${{ secrets.WILMS_STAGING_APP_URL != '' && secrets.WILMS_STAGING_API_URL != '' }}
        run: npm run smoke:staging
        env:
          WILMS_APP_URL: ${{ secrets.WILMS_STAGING_APP_URL }}
          WILMS_API_URL: ${{ secrets.WILMS_STAGING_API_URL }}
          WILMS_SMOKE_EMAIL: ${{ secrets.WILMS_SMOKE_EMAIL }}
          WILMS_SMOKE_PASSWORD: ${{ secrets.WILMS_SMOKE_PASSWORD }}

      - name: Staging deployment summary
        if: always()
        run: |
          echo "## Staging deploy" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Workflow: ${{ github.event.workflow_run.html_url }}" >> $GITHUB_STEP_SUMMARY
