# WILMS API — deploy from MONOREPO ROOT (not apps/backend).
# Railway Dashboard → Service → Settings → Root Directory: / (repository root)
#
# Required env: DATABASE_URL, WILMS_SESSION_SECRET, WILMS_CORS_ORIGIN,
# UPLOAD_PROVIDER=cloudinary, CLOUDINARY_*

[build]
builder = "nixpacks"
# Install/start defined in nixpacks.toml (npm ci --include=dev for tsx + drizzle-kit).

[deploy]
startCommand = "npm run start:prod -w @wilms/api"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
